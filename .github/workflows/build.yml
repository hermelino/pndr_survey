name: Build Pipeline

# Executa em pushes para main e PRs
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Permite execução manual

jobs:
  validate-pipeline:
    name: Validate Python Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Copy config template
        run: |
          cp scripts/config.example.yaml scripts/config.yaml

      - name: Validate pipeline scripts
        run: |
          cd scripts
          python main.py --help
          python generate_latex_tables.py --help || echo "No --help flag"
          python generate_figures.py --help
          echo "✅ Pipeline scripts validated"

      - name: Test import stage
        run: |
          cd scripts
          python main.py search --dry-run
          echo "✅ Import stage validated"

      - name: Test data integrity
        run: |
          # Verificar que os RIS/Excel das bases existem
          test -f data/1-records/1-1-records-scopus/scopus_20260225.ris || echo "⚠️  Scopus RIS missing"
          test -f data/1-records/1-2-records-scielo/scielo_20260226.ris || echo "⚠️  SciELO RIS missing"
          test -f data/1-records/1-3-records-capes/capes_20260224.ris || echo "⚠️  CAPES RIS missing"
          test -f data/1-records/1-4-records-econpapers/econpapers_20260224.ris || echo "⚠️  EconPapers RIS missing"
          test -f data/1-records/1-5-records-anpec/anpec_20260225.xlsx || echo "⚠️  ANPEC XLSX missing"
          echo "✅ Input data integrity checked"

  compile-latex:
    name: Compile LaTeX (if possible)
    runs-on: ubuntu-latest
    needs: validate-pipeline

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended texlive-lang-portuguese biber

      - name: Check if LaTeX files exist
        id: check-latex
        run: |
          if [ -f latex/main.tex ]; then
            echo "latex_exists=true" >> $GITHUB_OUTPUT
          else
            echo "latex_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Compile LaTeX
        if: steps.check-latex.outputs.latex_exists == 'true'
        run: |
          cd latex
          # Primeira passagem (pode falhar se referências ausentes)
          pdflatex -interaction=nonstopmode main.tex || echo "⚠️  First pass failed (expected if references missing)"

          # BibTeX (pode falhar se references.bib ausente)
          bibtex main || echo "⚠️  BibTeX failed (expected if references.bib missing)"

          # Segunda e terceira passagens
          pdflatex -interaction=nonstopmode main.tex || echo "⚠️  Second pass failed"
          pdflatex -interaction=nonstopmode main.tex || echo "⚠️  Third pass failed"

          # Verificar se PDF foi gerado
          if [ -f main.pdf ]; then
            echo "✅ PDF compiled successfully"
          else
            echo "⚠️  PDF not generated (possibly missing dependencies)"
            exit 1
          fi

      - name: Upload PDF artifact
        if: steps.check-latex.outputs.latex_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: article-pdf
          path: latex/main.pdf
          retention-days: 30

  lint-python:
    name: Lint Python Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linting tools
        run: |
          pip install black flake8 mypy

      - name: Check code formatting with Black
        run: |
          black --check scripts/ || echo "⚠️  Code not formatted (run: black scripts/)"

      - name: Lint with flake8
        run: |
          flake8 scripts/ --max-line-length=100 --extend-ignore=E203,W503 || echo "⚠️  Linting issues found"

      - name: Type check with mypy
        run: |
          mypy scripts/main.py scripts/src/ --ignore-missing-imports || echo "⚠️  Type issues found"
