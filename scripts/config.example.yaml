# =============================================================================
# pndr_survey — Configuração do Pipeline
# =============================================================================
# Copie este arquivo para config.yaml e preencha os valores.
# config.yaml está no .gitignore — nunca será versionado.
#
# Variáveis de ambiente: use ${VAR_NAME} para ler do ambiente.
# Exemplo: api_key: "${GEMINI_API_KEY}"
# =============================================================================

# --- Busca em bases acadêmicas ---
search:
  databases: ["econpapers", "capes", "scopus", "anpec", "scielo"]
  keywords_dir: "keywords"
  date_range:
    start: 2000
    end: 2025
  max_results_per_db: 1000

# --- Deduplicação ---
dedup:
  fuzzy_threshold: 90        # 0-100 (token_sort_ratio via rapidfuzz)
  title_normalization: true   # Remover acentos, lowercase, stopwords

# --- Triagem pré-LLM (PRISMA steps 3-4) ---
screening:
  excluded_doctypes:
    - "tese"
    - "dissertação"
    - "monografia"
    - "capítulo de livro"
    - "livro"
    - "editorial"
  eligible_languages: ["pt", "en", "por", "eng", "portuguese", "english"]
  relevance_keywords:
    - "fundo constitucional"
    - "fundos constitucionais"
    - "fundo de desenvolvimento"
    - "incentivo fiscal"
    - "incentivos fiscais"
    - "incentivos regionais"
    - "FNE"
    - "FNO"
    - "FCO"
    - "FDA"
    - "FDNE"
    - "FDCO"
    - "SUDENE"
    - "SUDAM"
    - "SUDECO"
    - "PNDR"
    - "constitutional fund"
    - "development fund"
    - "financing fund"
    - "regional fund"
    - "tax incentive"
    - "banco do nordeste"
    - "regional development policy"

# --- LLM (Gemini) ---
llm:
  provider: gemini
  model: gemini-2.5-flash
  api_key: "${GEMINI_API_KEY}"
  temperature: 0.1
  max_tokens_input: 100000
  rate_limit_seconds: 4

# --- Caminhos ---
paths:
  papers_dir: "../data/2-papers"
  questionnaires_dir: "questionnaires"

# --- Saída ---
output:
  directory: "../data/1-records/processed"
  formats: ["excel", "csv", "json"]
  timestamp: true             # Criar subdiretório YYYYMMDD_HHMMSS

# --- Logging ---
logging:
  level: INFO                 # Console: INFO ou DEBUG (--verbose)
  file_level: DEBUG           # Arquivo: sempre DEBUG

# --- Geração de Figuras ---
figures:
  # Diretório de dados RDS do projeto tese
  external_data_dir: "C:/OneDrive/github/tese/bulding_dataset_R/output/data"

  # Diretório base de shapefiles e dados geoespaciais (IBGE, Semiárido, Amazônia Legal)
  external_shapefiles_dir: "C:/OneDrive/DATABASES"

  # Diretório de scripts R (relativo ou absoluto)
  r_scripts_dir: "../data/r_scripts"

  # Diretório de saída das figuras
  output_dir: "../figures"

  # Executável R (auto-detect se vazio ou omitido)
  # Vazio = busca via PATH ou C:/Program Files/R/R-*/bin/Rscript.exe
  r_executable: ""  # Exemplo: "C:/Program Files/R/R-4.4.2/bin/Rscript.exe"

  # Forçar regeneração de todas as figuras (ignora timestamps)
  force_regenerate: false
